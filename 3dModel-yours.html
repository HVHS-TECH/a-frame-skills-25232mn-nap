<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
<script src="https://rawgit.com/donmccurdy/aframe-extras/v2.1.1/dist/aframe-extras.loaders.min.js"></script> 

  </head>
    <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>
      
      <a-entity 
      ply-model="src:house-48.ply"
      position="1 -1 -2"
      rotation="-90 0 0"
      ></a-entity>
      <a-entity 
      ply-model="src:dog.ply"
      position="1 -.4 -2"
      rotation="-90 0 -90"
      animation="
      property:rotation;
      from:-90 0 -90;
      to:-90 0 -360;
      dur:100;
      loop:true;"
      ></a-entity>
                 <a-entity camera
                 wasd-controls look-controls position="0 3 20"

animation="
property:position;
to:0 3 -5;
   dur: 10000
    "
    ></a-entity>


    </a-scene>
  </body>
</html>

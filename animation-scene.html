<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="black"></a-sky>
            <a-cone
            color="yellow"
            radius-bottom="0.1"
            radius-top="0.5"
            height="2"

            animation="
            property: position;
            from: 1 0 -10;
            to: 1 0 0;
            dur: 1500;
            dir: alternate;
            loop: true;"
            
            animation__rotation="
            property: rotation;
            from: 0 90 0;
            to: 0 0 0;
            dur:500;
            dir:alternate;
            loop:true;
            "
            animation__opacity="
            from:0;
            to:1
            dur:1000
            loop:true;
            "
            >
            </a-cone>

        </a-scene>
    </body>
</html>

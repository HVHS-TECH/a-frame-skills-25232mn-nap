<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="black"></a-sky>
            <a-cone
            color="yellow"
            radius-bottom="0.1"
            radius-top="0.5"
            height="2"

            animation="
            property: rotation;
            from: 90 0;
            to:0 0 0;
            dur:5;
            dir:alternate;
            loop:true;"
            
            animation__position="
            property: position;
            from:1 0 -5;
            to:1 0 0;
            dur:1000;
            dir:alternate;
            loop:true;
            "
            animation__opacity="
            property: opacity;
            from:0;
            to:1;
            dur:1000;
            loop:true;
            "
            >
            </a-cone>

        </a-scene>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="black"></a-sky>
            <a-cylinder
            color="yellow"
            radius-bottom="10"
            radius-top="1"
            animation="
            property: position;
            from: 1 0 -10;
            to: 1 0 0;
            dur: 1500;
            dir: alternate;
            loop: true;">
            </a-cylinder>

        </a-scene>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
        <!-- THIS IS WHERE YOUR CODE WILL GO -->
         <a-sky
            color="lightcyan">
         </a-sky>
         <a-plane
            position="0 0 0"
            rotation="-90 0 0"
            width="50 50 50"
            height="100 100 100"
            color="lightgray"
        ></a-plane>
        <a-sphere
        position="0 .5 -2"
        color="white"
        radius=".5"
        ></a-sphere>
         <a-sphere
        position="0 1.2 -2"
        color="white"
        radius=".35"
        ></a-sphere>
         <a-sphere
        position="0 1.7 -2"
        color="white"
        radius=".25"
        ></a-sphere>
        <a-cylinder
        position="0 1.9 -2"
        color="black"
        radius=".3"
        height=".1"
        ></a-cylinder>
        <a-cylinder
        position="0 2.155 -2"
        color="black"
        radius=".2"
        height=".5"
        ></a-cylinder>
        <a-cone
        position="0 1.7 -1.7"
        height=".1"
        radius-bottom=".010"
        radius-top=".001"
        rotation="90 0 0"
        color="orange"
        ></a-cone></a-scene>
    </body>
</html>
